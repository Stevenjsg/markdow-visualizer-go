# CI de MarkView (P6.3): lint + tests de Go y frontend en cada push/PR,
# y build multiplataforma de Wails para detectar pronto problemas de
# empaquetado (SDD §9).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    # Windows: wails compila sin dependencias de sistema (WebView2 es Go puro);
    # en Linux, vet/test del paquete main exigirían WebKitGTK.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # go:embed all:frontend/dist necesita que el directorio exista y no
      # esté vacío (frontend/dist está en .gitignore).
      - name: Placeholder de frontend/dist para go:embed
        shell: bash
        run: mkdir -p frontend/dist && touch frontend/dist/gitkeep

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -cover

  frontend:
    name: Frontend (lint + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build:
    name: wails build (${{ matrix.os }})
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dependencias de sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Instalar Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ubuntu-latest (24.04) trae WebKitGTK 4.1: hace falta el build tag.
      - name: wails build (Linux, WebKitGTK 4.1)
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41

      - name: wails build
        if: runner.os != 'Linux'
        run: wails build
